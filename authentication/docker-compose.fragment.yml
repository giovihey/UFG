# Add these services to your existing docker-compose.yml

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ufg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ufg_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # "postgres" here is the service name above — Docker resolves it to the container IP
      DB_URL: postgres://postgres:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/ufg
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: heyteam-auth
      JWT_AUDIENCE: ufg-game
    ports:
      - "8080:8080"
    networks:
      - ufg_net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  ufg_net:
    driver: bridge

volumes:
  postgres_data:
