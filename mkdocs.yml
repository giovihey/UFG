site_name: "UFG // ULTRA FIGHTING GAME"
site_url: https://giovihey.github.io/UFG/
nav:
  - "// HOME": index.md
  - "// REPORT":
      - Concept: concept.md
      - Requirements: requirements.md
      - Design: design.md
      - Architecture: architecture.md
      - Networking: networking.md
      - Implementation: implementation.md
      - Validation: validation.md
      - Deployment: deployment.md
      - User Guide: user_guide.md
      - Self-evaluation: self_evaluation/self_evaluation.md
      - Future Works: future_works.md
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Rajdhani
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
extra_css:
  - stylesheets/cyberpunk.css
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
